name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create, for example v0.3.0-beta
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string
      release_notes:
        description: Optional release notes (leave empty for auto-changelog)
        required: false
        type: string
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: false
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: true
        type: boolean

permissions:
  contents: write

env:
  SINGBOX_VERSION: "1.13.4"

jobs:
  # ── Create release first ───────────────────────────────
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          if [ -n "${{ inputs.release_notes }}" ]; then
            echo "${{ inputs.release_notes }}" > /tmp/notes.md
          else
            PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${{ inputs.tag_name }}$" | head -1)
            if [ -z "$PREV_TAG" ]; then
              LOG=$(git log --pretty=format:"- %s" --no-merges HEAD)
            else
              LOG=$(git log --pretty=format:"- %s" --no-merges "${PREV_TAG}..HEAD")
            fi
            echo "$LOG" | grep -v "^- chore" > /tmp/notes.md || echo "$LOG" > /tmp/notes.md
          fi

      - name: Create or update release
        id: create
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if any (to avoid duplicates)
          gh release delete "${{ inputs.tag_name }}" --yes 2>/dev/null || true

          ARGS="--notes-file /tmp/notes.md"
          if [ "${{ inputs.prerelease }}" = "true" ]; then ARGS="$ARGS --prerelease"; fi
          if [ "${{ inputs.draft }}" = "true" ]; then ARGS="$ARGS --draft"; fi

          TITLE="${{ inputs.release_name }}"
          if [ -z "$TITLE" ]; then TITLE="${{ inputs.tag_name }}"; fi

          gh release create "${{ inputs.tag_name }}" \
            --title "$TITLE" \
            $ARGS

          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/${{ inputs.tag_name }} --jq '.id')
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT

  # ── macOS GUI ──────────────────────────────────────────
  macos:
    name: macOS (aarch64)
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: swatinem/rust-cache@v2

      - name: Download sing-box sidecar
        run: |
          mkdir -p src-tauri/binaries
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-darwin-arm64.tar.gz" -o /tmp/sing-box.tar.gz
          tar -xzf /tmp/sing-box.tar.gz -C /tmp
          cp "/tmp/sing-box-${SINGBOX_VERSION}-darwin-arm64/sing-box" src-tauri/binaries/sing-box-aarch64-apple-darwin
          chmod +x src-tauri/binaries/sing-box-aarch64-apple-darwin

      - name: Run tests
        run: |
          npm test
          cargo test --workspace

      - name: Build Tauri app
        run: npm run tauri build -- --target aarch64-apple-darwin

      - name: Upload macOS artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag_name }}" \
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg \
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz \
            --clobber

  # ── Linux CLI + Daemon ─────────────────────────────────
  linux:
    name: Linux (${{ matrix.arch }})
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            arch: amd64
            singbox_arch: linux-amd64
          - target: aarch64-unknown-linux-gnu
            arch: arm64
            singbox_arch: linux-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: swatinem/rust-cache@v2

      - name: Download sing-box
        run: |
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION}-${{ matrix.singbox_arch }}.tar.gz" -o /tmp/sing-box.tar.gz
          tar -xzf /tmp/sing-box.tar.gz -C /tmp
          mkdir -p packaging/bin
          cp "/tmp/sing-box-${SINGBOX_VERSION}-${{ matrix.singbox_arch }}/sing-box" packaging/bin/sing-box
          chmod +x packaging/bin/sing-box

      - name: Build CLI and daemon
        run: |
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          fi
          cargo build --release -p calamity-cli -p calamityd --target ${{ matrix.target }}

      - name: Run tests (native only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test -p calamity-core --features linux

      - name: Prepare artifacts
        run: |
          VERSION="${{ inputs.tag_name }}"
          VERSION="${VERSION#v}"
          STAGING="calamity-${VERSION}-linux-${{ matrix.arch }}"
          mkdir -p "$STAGING"
          cp "target/${{ matrix.target }}/release/calamity" "$STAGING/"
          cp "target/${{ matrix.target }}/release/calamityd" "$STAGING/"
          cp packaging/bin/sing-box "$STAGING/"
          cp packaging/systemd/calamityd.service "$STAGING/"
          tar czf "${STAGING}.tar.gz" "$STAGING"
          echo "TARBALL=${STAGING}.tar.gz" >> $GITHUB_ENV
          echo "STAGING=${STAGING}" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      - name: Build deb package
        run: |
          cargo install cargo-deb --locked || true
          mkdir -p target/release
          cp "target/${{ matrix.target }}/release/calamity" target/release/
          cp "target/${{ matrix.target }}/release/calamityd" target/release/
          cd crates/calamityd
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            cargo deb --no-build --no-strip --target ${{ matrix.target }} \
              -o "../../calamity_${{ env.VERSION }}_${{ matrix.arch }}.deb"
          else
            cargo deb --no-build -o "../../calamity_${{ env.VERSION }}_${{ matrix.arch }}.deb"
          fi
          cd ../..
          echo "DEB=calamity_${{ env.VERSION }}_${{ matrix.arch }}.deb" >> $GITHUB_ENV

      - name: Build rpm package
        run: |
          cargo install cargo-generate-rpm --locked || true
          cd crates/calamityd
          cargo generate-rpm -o "../../calamity-${{ env.VERSION }}.${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'x86_64' || 'aarch64' }}.rpm"
          cd ../..
          RPM_ARCH=${{ matrix.target == 'x86_64-unknown-linux-gnu' && 'x86_64' || 'aarch64' }}
          echo "RPM=calamity-${{ env.VERSION }}.${RPM_ARCH}.rpm" >> $GITHUB_ENV

      - name: Build pacman package
        run: |
          PKG_ARCH=${{ matrix.arch == 'amd64' && 'x86_64' || 'aarch64' }}
          PKG_VERSION=$(echo "${{ env.VERSION }}" | tr '-' '_')
          PKG_FILE="calamity-${PKG_VERSION}-1-${PKG_ARCH}.pkg.tar.zst"

          mkdir -p pkg_root/usr/bin
          mkdir -p pkg_root/usr/lib/calamity
          mkdir -p pkg_root/usr/lib/systemd/system
          mkdir -p pkg_root/etc/calamity

          cp "${{ env.STAGING }}/calamity" pkg_root/usr/bin/
          cp "${{ env.STAGING }}/calamityd" pkg_root/usr/bin/
          cp "${{ env.STAGING }}/sing-box" pkg_root/usr/lib/calamity/
          cp "${{ env.STAGING }}/calamityd.service" pkg_root/usr/lib/systemd/system/

          cat > pkg_root/.PKGINFO <<EOF
          pkgname = calamity
          pkgver = ${PKG_VERSION}-1
          pkgdesc = A modern proxy client powered by sing-box
          url = https://github.com/Kotodian/calamity
          arch = ${PKG_ARCH}
          license = MIT
          depend = nftables
          EOF

          cd pkg_root
          tar --zstd -cf "../${PKG_FILE}" .PKGINFO usr etc
          cd ..
          echo "PACMAN=${PKG_FILE}" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ inputs.tag_name }}" \
            "${{ env.TARBALL }}" \
            "${{ env.DEB }}" \
            "${{ env.RPM }}" \
            "${{ env.PACMAN }}" \
            --clobber
