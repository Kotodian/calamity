name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to create, for example v0.1.0
        required: true
        type: string
      release_name:
        description: Optional release title
        required: false
        type: string
      release_notes:
        description: Optional release notes shown on GitHub Releases
        required: false
        type: string
      draft:
        description: Create the GitHub release as a draft
        required: true
        default: true
        type: boolean
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  manual-release:
    name: Build ${{ matrix.target }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Run frontend tests
        run: npm test

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Build and upload Tauri release artifacts
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ inputs.tag_name }}
          releaseName: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag_name }}
          releaseBody: ${{ inputs.release_notes != '' && inputs.release_notes || 'Manual release build triggered from GitHub Actions.' }}
          releaseDraft: ${{ inputs.draft }}
          prerelease: ${{ inputs.prerelease }}
          uploadWorkflowArtifacts: true
          args: --target ${{ matrix.target }}
